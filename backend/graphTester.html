<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gene Network Graph</title>
  <!-- Include vis.js from a CDN -->
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    #network {
      width: 800px;
      height: 600px;
      border: 1px solid lightgray;
    }
  </style>
</head>
<body>
  <div id="network"></div>
  <script type="text/javascript">
    // Load the JSON file (ensure the file path is correct relative to this HTML file)
    fetch('graphOutputs/gene_network.json')
      .then(response => response.json())
      .then(data => {
        // Create DataSet objects for nodes and edges
        var nodes = new vis.DataSet(data.nodes);
        var edges = new vis.DataSet(data.edges);

        // Prepare the data in the vis.js format
        var graphData = {
          nodes: nodes,
          edges: edges
        };

        // Define any network options if necessary
        var options = {
          physics: {
            enabled: true,
            barnesHut: {
              gravitationalConstant: -2000,
              centralGravity: 0.3,
              springLength: 95
            }
          }, 
          edges: {
            font: {
              size: 0
            }
          }
        };

        // Create a network instance
        var container = document.getElementById('network');
        var network = new vis.Network(container, graphData, options);
      })
      .catch(error => console.error('Error loading JSON file:', error));
  </script>
</body>
</html>
