# --------------------------------------------------------------------
#  nginx.conf  – HTTPS front‑end for FastAPI on localhost:8000
#    • Port 80  : redirects everything to HTTPS
#    • Port 443 : serves Let’s Encrypt cert + proxies /api/ to FastAPI
# --------------------------------------------------------------------

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    #################################################################
    # 1)  HTTP  → redirect to HTTPS, but expose ACME validation path
    #################################################################
    server {
        listen 80;
        server_name api.gidgraph.com;

        # Let win‑acme reach its challenge files during auto‑renew
        location /.well-known/acme-challenge/ {
            root   C:/ProgramData/win-acme/acme-v02.api.letsencrypt.org;
        }

        # Everything else – permanent redirect to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    #################################################################
    # 2)  HTTPS  – reverse‑proxy /api/ to FastAPI on localhost:8000
    #################################################################
    server {
        listen 443 ssl;
        server_name api.gidgraph.com;

        # --- Let’s Encrypt certificate + key -----------------------
        ssl_certificate     C:/ProgramData/win-acme/acme-v02.api.letsencrypt.org/Certificates/api.gidgraph.com-chain.pem;
        ssl_certificate_key C:/ProgramData/win-acme/acme-v02.api.letsencrypt.org/Certificates/api.gidgraph.com-key.pem;

        # Optional modern TLS tuning
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;
        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        # --- Proxy everything under /api/ to FastAPI --------------
        location /api/ {
            proxy_pass         http://127.0.0.1:8000/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
